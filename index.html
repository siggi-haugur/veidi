<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ertu að fá' ann</title>
    <style>
        body { background-color: #000; font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; color: white; }
        .header { margin-top: 60px; margin-bottom: 30px; text-align: center; }
        /* Hér er lógóið þitt hýst á netinu svo það klikki aldrei */
        .logo { width: 240px; height: auto; content: url('https://i.ibb.co/6R0D5fS/ertu-ad-fa-ann-app-logo.png'); }
        .container { width: 90%; max-width: 450px; padding-bottom: 60px; }
        .btn { display: block; background: linear-gradient(145deg, #d4af37, #b8860b); color: #000; text-decoration: none; margin-bottom: 15px; padding: 22px; border-radius: 14px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn h2 { margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .btn p { margin: 4px 0 0 0; font-size: 13px; font-weight: 600; opacity: 0.85; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #splash img { width: 280px; content: url('https://i.ibb.co/6R0D5fS/ertu-ad-fa-ann-app-logo.png'); }
    </style>
</head>
<body>
    <div id="splash"><img src=""></div>
    <div class="header"><img src="" class="logo"></div>
    <div class="container">
        <a href="https://ertuadfann.is/frettir/" class="btn"><h2>Fréttir</h2><p>Nýjustu fréttir úr veiðinni</p></a>
        <a href="https://ertuadfann.is/rad-haugsins/" class="btn"><h2>Gerum betur</h2><p>Ráðleggingar og fróðleikur</p></a>
        <a href="https://ertuadfann.is/islenskar-flugur/" class="btn"><h2>Gagnagrunnur</h2><p>Íslenskar flugur</p></a>
        <a href="https://ertuadfann.is/their-storu/" class="btn"><h2>Þeir Stóru</h2><p>Stærstu fiskar sumarsins + 90cm</p></a>
        <a href="https://ertuadfann.is/veiditolur/" class="btn"><h2>Veiðitölur</h2><p>Nýjustu tölur úr laxveiðinni</p></a>
        <a href="https://ertuadfann.is/vedur/" class="btn"><h2>Veður</h2><p>Aðstæður á veiðislóðum</p></a>
    </div>
    <script>
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.transition = "opacity 0.5s";
            splash.style.opacity = "0";
            setTimeout(() => splash.style.display = 'none', 500);
        }, 1200);
    </script>
</body>
</html>
